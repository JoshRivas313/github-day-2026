# ============================================================
# deploy.yml — Pipeline de deploy automático a GitHub Pages
# Se dispara en cada push a main (es decir, en cada merge de PR).
# Merge a main == deploy en producción. Siempre.
#
# GitHub Day Lima 2026 — José Hurtado Rivas (@josehurtadorivas)
# GitOps: El Superpoder del Pull Request
# ============================================================

name: Deploy — GitHub Pages

on:
  push:
    branches:
      - main

# Permisos requeridos por la action de GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un deploy concurrente.
# Cancela deploys en cola si hay uno nuevo esperando.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Job 1: Build ──────────────────────────────────────────
  build:
    name: Build Angular
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # IMPORTANTE: --base-href debe apuntar al nombre del repositorio
      # para que GitHub Pages sirva los assets correctamente.
      # Reemplaza 'github-day-2026' con el nombre real de tu repo.
      - name: Build Angular (production + base-href)
        run: |
          npm run build:prod -- --base-href /github-day-2026/
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/github-day-2026

  # ── Job 2: Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── Summary con información del deploy ─────────────────
      - name: Write deployment summary
        run: |
          echo "## 🚀 Deploy Exitoso" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 URL | ${{ steps.deployment.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🕐 Timestamp | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 60 segundos. Cero SSH. Cero servidores. Solo Git. 🎯" >> $GITHUB_STEP_SUMMARY
