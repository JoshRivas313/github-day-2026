# ============================================================
# ci.yml — Pipeline de integración continua
# Se dispara en cada Pull Request hacia main.
# Valida el build de Angular y la integridad de event.json.
#
# GitHub Day Lima 2026 — José Hurtado Rivas (@josehurtadorivas)
# GitOps: El Superpoder del Pull Request
# ============================================================

name: CI — Build & Validate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write   # Necesario para dejar comentarios en el PR

jobs:
  build-and-validate:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout del código ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js con cache de npm ──────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Instalar dependencias (modo CI, sin modificar lockfile) ──
      - name: Install dependencies
        run: npm ci

      # ── 4. Build Angular en modo producción ────────────────
      - name: Build Angular (production)
        run: npm run build:prod
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # ── 5. Validar event.json ───────────────────────────────
      - name: Validate event.json
        id: validate
        run: node scripts/validate-event.js

      # ── 6. Comentario automático en el PR con el resultado ─
      - name: Comment PR with CI result
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const success = '${{ job.status }}' === 'success';
            const actor   = context.actor;
            const sha     = context.sha.slice(0, 7);
            const ref     = context.ref.replace('refs/heads/', '');

            const body = success
              ? `## ✅ CI Passed — \`${sha}\`

            | Check | Estado |
            |-------|--------|
            | 📦 npm install | ✅ OK |
            | 🔨 ng build (production) | ✅ OK |
            | 📋 event.json válido | ✅ OK |

            **Listo para merge.** El botón verde está habilitado.

            > Triggered by @${actor} · commit \`${sha}\``
              : `## ❌ CI Failed — \`${sha}\`

            Uno o más checks fallaron. Revisa los logs de Actions para ver el error.

            | Check | Estado |
            |-------|--------|
            | 📦 npm install | Ver logs |
            | 🔨 ng build (production) | Ver logs |
            | 📋 event.json válido | Ver logs |

            **El merge está bloqueado hasta que el CI esté en verde.**

            > Triggered by @${actor} · commit \`${sha}\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
